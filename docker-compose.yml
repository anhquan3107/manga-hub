version: '3.8'

services:
  http:
    build: .
    command: api-server
    ports:
      - "8080:8080"
    volumes:
      - mangahub-data:/app/data
    environment:
      - HTTP_ADDR=:8080
      - DB_PATH=/app/data/mangahub.db
      - SEED_FILE=/app/data/manga.sample.json
      - JWT_SECRET=production-secret-change-me
      - ALLOWED_ORIGIN=*
    restart: unless-stopped

  tcp:
    build: .
    command: tcp-server
    ports:
      - "9090:9090"
    volumes:
      - mangahub-data:/app/data
    environment:
      - TCP_ADDR=:9090
      - DB_PATH=/app/data/mangahub.db
    restart: unless-stopped

  udp:
    build: .
    command: udp-server
    ports:
      - "9091:9091/udp"
    environment:
      - UDP_ADDR=:9091
    restart: unless-stopped

  grpc:
    build: .
    command: grpc-server
    ports:
      - "9092:9092"
    volumes:
      - mangahub-data:/app/data
    environment:
      - GRPC_ADDR=:9092
      - DB_PATH=/app/data/mangahub.db
    restart: unless-stopped

volumes:
  mangahub-data:
    driver: local
